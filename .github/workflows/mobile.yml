name: Mobile Build (On-Demand)

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      arch:
        description: 'Android architecture'
        required: false
        default: 'fat'
        type: choice
        options:
          - arm64
          - amd64
          - fat

env:
  GO_VERSION: "1.26.x"
  NODE_VERSION: "22"

jobs:
  # ==================== Android Build ====================
  android:
    if: inputs.platform == 'all' || inputs.platform == 'android' || github.event.inputs.platform == ''
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun

      - name: Install Task
        run: npm install -g @go-task/cli

      - name: Install Wails CLI
        shell: bash
        run: |
          mkdir -p "$(go env GOPATH)/bin"
          CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.76

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Android SDK + NDK r26d
        uses: android-actions/setup-android@v3
        with:
          packages: 'tools platform-tools ndk;r26d'

      - name: Setup Android NDK
        run: |
          # Prefer r26d if installed by packages above
          if [ -d "$ANDROID_HOME/ndk/r26d" ]; then
            echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/r26d" >> $GITHUB_ENV
          # Fallback to pre-installed NDK 27
          elif [ -d "$ANDROID_HOME/ndk/27.3.13750724" ]; then
            echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> $GITHUB_ENV
          else
            echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$(ls $ANDROID_HOME/ndk | head -1)" >> $GITHUB_ENV
          fi
          echo "Using NDK: $ANDROID_NDK_HOME"

      - name: Build arm64 APK
        if: inputs.arch == 'arm64' || inputs.arch == 'fat'
        run: task android:build ARCH=arm64

      - name: Build amd64 APK
        if: inputs.arch == 'amd64' || inputs.arch == 'fat'
        run: task android:build ARCH=amd64

      - name: Package fat APK
        if: inputs.arch == 'fat'
        run: task android:package:fat

      - name: Package single-arch APK
        if: inputs.arch != 'fat'
        run: task android:assemble:apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swt-android-${{ inputs.arch || 'fat' }}
          path: bin/swt*.apk

  # ==================== iOS Build ====================
  ios:
    if: inputs.platform == 'all' || inputs.platform == 'ios' || github.event.inputs.platform == ''
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun

      - name: Install Task
        run: npm install -g @go-task/cli

      - name: Install Wails CLI
        shell: bash
        run: |
          mkdir -p "$(go env GOPATH)/bin"
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build iOS App
        run: task ios:package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swt-ios
          path: bin/swt.app
