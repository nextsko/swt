name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  GO_VERSION: "1.26.x"
  NODE_VERSION: "22"

jobs:
  # ==================== Desktop Platforms ====================
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows/amd64
            os: windows-latest
            task_prefix: windows
            artifact_name: windows-amd64
          - platform: darwin/universal
            os: macos-latest
            task_prefix: darwin
            artifact_name: darwin-universal
          - platform: linux/amd64
            os: ubuntu-latest
            task_prefix: linux
            artifact_name: linux-amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun

      - name: Install Task
        run: npm install -g @go-task/cli

      - name: Install Wails CLI
        shell: bash
        run: |
          mkdir -p "$(go env GOPATH)/bin"
          if [[ "${{ matrix.os }}" == ubuntu-* ]]; then
            CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.76
          else
            go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          fi

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build - ${{ matrix.platform }}
        run: task ${{ matrix.task_prefix }}:build

      - name: Package - ${{ matrix.platform }}
        if: matrix.os != 'ubuntu-latest'
        run: task ${{ matrix.task_prefix }}:package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swt-${{ matrix.artifact_name }}
          path: bin/*

  # ==================== Android ====================
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun

      - name: Install Task
        run: npm install -g @go-task/cli

      - name: Install Wails CLI
        shell: bash
        run: |
          mkdir -p "$(go env GOPATH)/bin"
          CGO_ENABLED=0 go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.76

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26d
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;r26d" || \
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;r26d" || \
          echo "Warning: NDK r26d manual install failed, trying fallback..."
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/r26d" >> $GITHUB_ENV

      - name: Build fat APK
        run: task android:package:fat

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swt-android-fat-apk
          path: bin/swt.apk

  # ==================== iOS ====================
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install bun
        run: npm install -g bun

      - name: Install Task
        run: npm install -g @go-task/cli

      - name: Install Wails CLI
        shell: bash
        run: |
          mkdir -p "$(go env GOPATH)/bin"
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Build iOS App
        run: task ios:package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: swt-ios
          path: bin/swt.app

  # ==================== Release ====================
  release:
    needs: [build-desktop, build-android, build-ios]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.apk
            artifacts/**/*.exe
            artifacts/**/*.msix
            artifacts/swt-darwin-universal/**/*
            artifacts/swt-linux-amd64/**/*
            artifacts/swt-ios/swt.app/**
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
